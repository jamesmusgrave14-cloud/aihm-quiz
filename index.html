<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Harms Mitigation Team - AI Showcase Quiz</title>

  <style>
    :root {
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --bg: #f8fafc;
      --card-bg: #ffffff;
      --text: #0f172a;
      --text-light: #64748b;
      --correct: #22c55e;
      --wrong: #ef4444;
      --wrong-hover: #dc2626;
    }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }
    .container {
      background: var(--card-bg);
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
      max-width: 650px;
      width: 100%;
      text-align: center;
    }
    .screen { display: none; }
    .screen.active { display: block; }

    h1 { margin-top: 0; font-size: 1.6rem; color: var(--primary); }
    h2 { font-size: 1.25rem; margin-bottom: 15px; }

    .progress-container {
      width: 100%;
      background-color: #e2e8f0;
      border-radius: 8px;
      height: 10px;
      margin-bottom: 20px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background-color: var(--primary);
      width: 0%;
      transition: width 0.4s ease;
    }

    button {
      background-color: var(--primary);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 1.05rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 10px;
    }
    button:hover:not(:disabled) { background-color: var(--primary-hover); }
    button:disabled { background-color: #94a3b8; cursor: not-allowed; }

    .btn-danger { background-color: var(--wrong); }

    .options-grid { display: grid; gap: 12px; margin-top: 20px; }
    .option-btn {
      background-color: var(--bg);
      color: var(--text);
      border: 2px solid #e2e8f0;
      padding: 15px;
      text-align: left;
      border-radius: 8px;
    }
    .option-btn.correct { background-color: var(--correct); color: white; }
    .option-btn.wrong { background-color: var(--wrong); color: white; }

    .header-info {
      display: flex;
      justify-content: space-between;
      margin-bottom: 15px;
      font-weight: bold;
      color: var(--text-light);
    }

    .leaderboard-list {
      list-style: none;
      padding: 0;
      text-align: left;
      background: #f8fafc;
      border-radius: 8px;
      margin-top: 15px;
    }
    .leaderboard-list li {
      padding: 12px 20px;
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      justify-content: space-between;
    }
    .leaderboard-list li:nth-child(1) { background-color: #fef08a; font-weight: bold; }
    .leaderboard-list li:nth-child(2) { background-color: #e2e8f0; }
    .leaderboard-list li:nth-child(3) { background-color: #fed7aa; }
  </style>
</head>

<body>

<div class="container">

  <div id="start-screen" class="screen active">
    <h1>AI Harms Mitigation Team<br>AI Showcase Quiz</h1>
    <p>You have 20 seconds per question. Faster answers earn more points!</p>
    <button onclick="startQuiz()">Start</button><br><br>
    <button onclick="showLeaderboard()">View Leaderboard</button>
  </div>

  <div id="quiz-screen" class="screen">
    <div class="progress-container"><div class="progress-bar" id="progress-bar"></div></div>
    <div class="header-info">
      <span id="question-tracker"></span>
      <span id="timer-display"></span>
    </div>
    <h2 id="question-text"></h2>
    <div id="options-container" class="options-grid"></div>
    <button id="next-btn" onclick="nextQuestion()" style="display:none;">Next Question</button>
  </div>

  <div id="end-screen" class="screen">
    <h1>Complete!</h1>
    <h2 id="final-score"></h2>
    <input type="text" id="player-name" placeholder="Your Name" maxlength="15"><br>
    <button onclick="saveScore()">Save Score</button>
    <button onclick="resetQuiz()">Play Again</button>
  </div>

  <div id="leaderboard-screen" class="screen">
    <h1>Leaderboard</h1>
    <ul id="leaderboard-list" class="leaderboard-list"></ul>
    <button onclick="resetLeaderboard()" class="btn-danger">Clear Leaderboard</button>
    <button onclick="resetQuiz()">Back</button>
  </div>

</div>

<script>
const LOCAL_KEY = "teamAIQuizLeaderboard";

const masterQuestions = [
  { q:"According to a Q1 2025 analysis of honeypot calls by Hiya, what proportion contained AI audio?",
    options:["1 in 100","1 in 4 (25%)","1 in 2 (50%)","9 in 10 (90%)"], correct:1 }
];

let currentQuestions = [];
let index = 0;
let score = 0;
let timeLeft = 20;
let timer;

const screens = ["start","quiz","end","leaderboard"];

function show(name){
  screens.forEach(s => document.getElementById(`${s}-screen`).classList.remove("active"));
  document.getElementById(`${name}-screen`).classList.add("active");
}

function startQuiz(){
  currentQuestions = [...masterQuestions];
  index = 0; score = 0;
  show("quiz");
  loadQuestion();
}

function loadQuestion(){
  const q = currentQuestions[index];
  document.getElementById("question-text").textContent = q.q;
  document.getElementById("question-tracker").textContent = `Question ${index+1}`;
  document.getElementById("timer-display").textContent = `Time: ${timeLeft}s`;

  const opts = document.getElementById("options-container");
  opts.innerHTML = "";
  q.options.forEach((o,i)=>{
    const b=document.createElement("button");
    b.className="option-btn";
    b.textContent=o;
    b.onclick=()=>answer(i,b);
    opts.appendChild(b);
  });

  timeLeft=20;
  clearInterval(timer);
  timer=setInterval(()=>{timeLeft--;document.getElementById("timer-display").textContent=`Time: ${timeLeft}s`;},1000);
}

function answer(i,btn){
  clearInterval(timer);
  const q=currentQuestions[index];
  if(i===q.correct) score+=100+timeLeft*10;
  btn.classList.add(i===q.correct?"correct":"wrong");
  document.getElementById("next-btn").style.display="block";
}

function nextQuestion(){
  index++;
  if(index<currentQuestions.length) loadQuestion();
  else{
    document.getElementById("final-score").textContent=`Your Score: ${score}`;
    show("end");
  }
}

function saveScore(){
  const name=document.getElementById("player-name").value.trim();
  if(!name) return;
  const lb=JSON.parse(localStorage.getItem(LOCAL_KEY)||"[]");
  lb.push({name,score});
  lb.sort((a,b)=>b.score-a.score);
  localStorage.setItem(LOCAL_KEY,JSON.stringify(lb.slice(0,10)));
  showLeaderboard();
}

function showLeaderboard(){
  show("leaderboard");
  const list=document.getElementById("leaderboard-list");
  list.innerHTML="";
  const lb=JSON.parse(localStorage.getItem(LOCAL_KEY)||"[]");
  lb.forEach((e,i)=>{
    const li=document.createElement("li");
    li.innerHTML=`<strong>#${i+1} ${e.name}</strong><span>${e.score}</span>`;
    list.appendChild(li);
  });
}

function resetLeaderboard(){
  localStorage.removeItem(LOCAL_KEY);
  showLeaderboard();
}

function resetQuiz(){
  document.getElementById("player-name").value="";
  show("start");
}
</script>

</body>
</html>
